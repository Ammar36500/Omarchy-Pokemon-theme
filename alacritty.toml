[env]
TERM = "xterm-256color"

[font]
normal = { family = "iA Writer Mono S" }
bold = { family = "iA Writer Mono S" }
italic = { family = "iA Writer Mono S" }
size = 9

[window]
padding.x = 14
padding.y = 14
decorations = "None"
opacity = 0.6

[keyboard]
bindings = [
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

[terminal]
osc52 = "CopyPaste"

[colors.primary]
background = "#0a0a0a"
foreground = "#ffe8c0"

[colors.normal]
black   = "#0f2138"
red     = "#c56363"
green   = "#76c276"
yellow  = "#cebd7c"
blue    = "#9a98be"
magenta = "#d095d0"
cyan    = "#9fd5d5"
white   = "#fdf4c4"

[colors.bright]
black   = "#7893b4"
red     = "#e1a3a3"
green   = "#b1dfb1"
yellow  = "#e5dbb2"
blue    = "#c3c2da"
magenta = "#e5bee5"
cyan    = "#c2e7e7"
white   = "#fff7cc"

[colors.cursor]
text   = "#0f2138"
cursor = "#fdf4c4"
